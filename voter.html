<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voter ID Card Replica</title>

<style>
    body {
        background: #f2f2f2;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
    }

    .voter-card {
        width: 300px;
        height: 480px;
        background: linear-gradient(to bottom, #f6c08b 0%, #ffffff 45%, #9fe0c3 100%);
        border-radius: 16px;
        padding: 14px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        box-sizing: border-box;
        position: relative;
    }

    /* Header */
    .header {
        text-align: center;
        font-size: 12px;
        font-weight: bold;
    }

    .header img {
        width: 40px;
        margin-bottom: 4px;
    }

    .header small {
        font-weight: normal;
        font-size: 10px;
    }

    /* Photo */
    .photo {
        width: 130px;
        height: 150px;
        background: #bbb;
        margin: 12px auto;
        border: 2px solid #333;
    }

    /* Barcode */
    .barcode {
        width: 160px;
        height: 35px;
        background: repeating-linear-gradient(
            to right,
            #000,
            #000 2px,
            #fff 2px,
            #fff 4px
        );
        margin: 6px auto 10px;
    }

    .epic {
        text-align: center;
        font-size: 11px;
        font-weight: bold;
        margin-bottom: 8px;
    }

    /* Details */
    .details {
        font-size: 12px;
        line-height: 1.6;
    }

    .row {
        display: flex;
        justify-content: space-between;
    }

    .label {
        font-weight: bold;
        width: 45%;
    }

    .value {
        width: 55%;
        text-align: right;
    }

    /* Watermark */
    .chakra {
        position: absolute;
        top: 120px;
        left: 20px;
        width: 260px;
        height: 260px;
        opacity: 0.08;
        border-radius: 50%;
        border: 4px solid #000;
    }
</style>
</head>

<body>

<div class="voter-card">

    <div class="chakra"></div>

    <!-- Header -->
    <div class="header">
        <div>आपका निर्वाचन आयोग</div>
        <div>ELECTION COMMISSION OF YOURS</div>
        <small>ELECTOR PHOTO IDENTITY CARD</small>
    </div>

    <!-- Photo -->
    <div class="photo"></div>

    <!-- Barcode -->
    <div class="barcode"></div>
    <div class="epic">GND0023659</div>

    <!-- Details -->
    <div class="details">
        <div class="row">
            <div class="label">निर्वाचक का नाम</div>
            <div class="value">SAI VAISHNAVI</div>
        </div>

        <div class="row">
            <div class="label">पिता का नाम</div>
            <div class="value">NAGARAJU</div>
        </div>

        <div class="row">
            <div class="label">लिंग / SEX</div>
            <div class="value">महिला / FEMALE</div>
        </div>

        <div class="row">
            <div class="label">जन्म की तारीख</div>
            <div class="value">15/02/1985</div>
        </div>
    </div>

</div>

</body>
</html>
