<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student ID Card</title>

<style>
    body {
        background: #eef1f7;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
    }

    .id-card {
        width: 640px;
        height: 280px;
        background: #ffffff;
        border-radius: 14px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        display: flex;
        overflow: hidden;
    }

    /* Left Section */
    .left {
        width: 200px;
        background: linear-gradient(135deg, #3f3d8f, #5c6bc0);
        color: #fff;
        padding: 18px;
        box-sizing: border-box;
        text-align: center;
    }

    .college {
        font-size: 14px;
        font-weight: bold;
        margin-bottom: 12px;
        text-transform: uppercase;
    }

    .photo {
        width: 120px;
        height: 150px;
        background: #ccc;
        border-radius: 10px;
        margin: 0 auto;
        border: 3px solid #fff;
    }

    /* Right Section */
    .right {
        flex: 1;
        padding: 22px;
        box-sizing: border-box;
        position: relative;
    }

    .title {
        font-size: 22px;
        font-weight: bold;
        color: #2f2f7a;
        margin-bottom: 16px;
    }

    .details {
        font-size: 14px;
        line-height: 1.8;
    }

    .details span {
        font-weight: bold;
        color: #000;
    }

    /* Barcode */
    .barcode {
        width: 220px;
        height: 40px;
        background: repeating-linear-gradient(
            to right,
            #000,
            #000 2px,
            #fff 2px,
            #fff 4px
        );
        position: absolute;
        bottom: 22px;
        left: 22px;
    }

    /* Decorative Shape */
    .corner {
        position: absolute;
        top: 0;
        right: 0;
        width: 140px;
        height: 140px;
        background: #5c6bc0;
        border-bottom-left-radius: 140px;
    }
</style>
</head>

<body>

<div class="id-card">

    <!-- Left -->
    <div class="left">
        <div class="college">MVSR Engineering College</div>
        <div class="photo"></div>
    </div>

    <!-- Right -->
    <div class="right">
        <div class="corner"></div>

        <div class="title">STUDENT ID CARD</div>

        <div class="details">
            <span>Name</span> : Sai Vaishnavi<br>
            <span>Student ID</span> : 2451-23-748-040<br>
            <span>DOB:</span> : 07-12-2005<br>
            <span>Grade - Year</span> : 3/2 - 2026<br>
            <span>Issued On</span> : Jan 20, 2026
        </div>

        <div class="barcode"></div>
    </div>

</div>

</body>
</html>
